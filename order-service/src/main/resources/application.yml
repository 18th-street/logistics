server:
  port: 19099

spring:
  application:
    name: order-service
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest

  jpa:
    database: postgresql
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    hostname: localhost


message:
  exchange: logistics
  queue:
    delivery:
      created: logistics.delivery.created
      cancelled: logistics.delivery.cancelled
    slack: logistics.slack
  err:
    exchange: logistics.err
    queue:
      delivery:
        created: logistics.err.delivery.created
        cancelled: logistics.err.delivery.cancelled
  complete:
    exchange: logistics.complete
    queue:
      delivery:
        created: logistics.complete.delivery.created
        cancelled: logistics.complete.delivery.cancelled
