server:
  port: 19091

spring:
  application:
    name: gateway-service

  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes: # 라우팅 설정
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
      discovery:
        locator:
          enabled: true # 동적 라우팅 생성
  data:
    redis:
      host: localhost
      port: 6379
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/